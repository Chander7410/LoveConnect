services:
  - type: web
    name: loveconnect-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://love-connect-beta.vercel.app
      - key: APP_JWT_SECRET
        generateValue: true
      - key: APP_JWT_EXPIRATION_MINUTES
        value: 1440
      - key: APP_UPLOAD_DIR
        value: /app/uploads
