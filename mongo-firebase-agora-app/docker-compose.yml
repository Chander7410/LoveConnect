services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/loveconnect_mongo
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5174,http://localhost:3000
      ALLOW_DEV_TOKENS: "true"
      FIREBASE_SERVICE_ACCOUNT_JSON: ""
    depends_on:
      - mongo

volumes:
  mongo_data:
