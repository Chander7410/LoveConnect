server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: loveconnect-mongo-firebase-agora
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/loveconnect_mongo}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  firebase:
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
    allow-dev-tokens: ${ALLOW_DEV_TOKENS:false}
  jwt:
    secret: ${APP_JWT_SECRET:change-this-to-a-long-random-production-secret}
  agora:
    app-id: ${AGORA_APP_ID:}
    app-certificate: ${AGORA_APP_CERTIFICATE:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
