server:
  port: ${SERVER_PORT:${PORT:8080}}

spring:
  application:
    name: loveconnect-mongo-firebase-agora
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/loveconnect_mongo}
  mail:
    host: ${BREVO_SMTP_HOST:smtp-relay.brevo.com}
    port: ${BREVO_SMTP_PORT:587}
    username: ${BREVO_SMTP_USERNAME:}
    password: ${BREVO_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${SMTP_TIMEOUT:10000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:10000}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://love-connect-beta.vercel.app,http://localhost:5173,http://127.0.0.1:5173}
  firebase:
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
    allow-dev-tokens: ${ALLOW_DEV_TOKENS:false}
  jwt:
    secret: ${JWT_SECRET:${APP_JWT_SECRET:change-this-to-a-long-random-production-secret}}
    expiry: ${JWT_EXPIRY:86400}
  smtp:
    from-email: ${MAIL_FROM:supportloveconnect@gmail.com}
  brevo:
    api-key: ${BREVO_API_KEY:}
  sms:
    provider: ${SMS_PROVIDER:CONSOLE}
    api-key: ${SMS_API_KEY:}
    sender-id: ${SMS_SENDER_ID:}
    template-id: ${SMS_TEMPLATE_ID:}
    fast2sms-route: ${FAST2SMS_ROUTE:OTP}
  otp:
    expose-dev-response: ${APP_DEV_OTP_RESPONSE:false}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
